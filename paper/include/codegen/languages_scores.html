<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, initial-scale=1.0">
    <title>Code Generation — Scores by Language</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
         
        @page {
            size: 1200px 800px;
            margin: 0;
        }
        *, *::before, *::after { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            width: 1200px;
            height: 800px;
            overflow: hidden;
            background: transparent;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #0f172a;
        }
        #chart {
            width: 1200px;
            height: 800px;
        }
    </style>
</head>
<body>
    <div id="chart"></div>
    <script>
        const xAxisData = ["Python","JavaScript","Java","Go","C++","Rust"];
        const seriesData = [{"name":"Exact","data":[0,0,0.3,0,0,0]},{"name":"Partial","data":[0.35000000000000003,0.632,0.8379999999999999,0.66,0.9059999999999999,0.914]},{"name":"Fuzzy","data":[0.35000000000000003,0.632,0.8379999999999999,0.66,0.9059999999999999,0.914]},{"name":"Weighted","data":[0.1590909090909091,0.28727272727272724,0.5445454545454546,0.29999999999999993,0.4118181818181818,0.4154545454545454]}];
        const chart = echarts.init(document.getElementById('chart'), null, { renderer: 'svg' });

        const palette = ['#2563eb','#059669','#64748b','#dc2626','#7c3aed','#d97706'];

        const option = {
            backgroundColor: 'transparent',
            animation: false,
            tooltip: { trigger: 'axis' },
            legend: { top: '5%', textStyle: { color: '#475569', fontSize: 12 } },
            grid: { left: '10%', right: '10%', top: '20%', bottom: '15%' },
            xAxis: {
                type: 'category',
                data: xAxisData,
                axisLabel: { color: '#475569' },
                nameLocation: 'middle',
                nameGap: 30
            },
            yAxis: {
                type: 'value',
                axisLabel: { color: '#475569' },
                splitLine: { show: true, lineStyle: { color: '#e2e8f0', type: 'dashed' } }
            },
            series: seriesData.map((s, i) => ({
                name: s.name,
                type: 'bar',
                data: s.data,
                itemStyle: { color: palette[i % palette.length], borderRadius: [4, 4, 0, 0] }
            }))
        };
        chart.setOption(option);


    </script>
</body>
</html>
