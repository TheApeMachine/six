<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, initial-scale=1.0">
    <title>Code Generation — Scores by Language</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
         
        @page {
            size: 1200px 800px;
            margin: 0;
        }
        *, *::before, *::after { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            width: 1200px;
            height: 800px;
            overflow: hidden;
            background: transparent;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #0f172a;
        }
        #chart {
            width: 1200px;
            height: 800px;
        }
    </style>
</head>
<body>
    <div id="chart"></div>
    <script>
        const xAxisData = ["Python","JavaScript","Java","Go","C++","Rust"];
        const seriesData = [{"name":"Exact","data":[0,0,0,0,0,0]},{"name":"Partial","data":[0.0659472117756755,0.15171197153450916,0.09942418615499558,0.0862157299179315,0.06753076090418268,0.07702457103804018]},{"name":"Fuzzy","data":[0.032454477212847124,0.07492078699189861,0.07591690040403593,0.05212977950373867,0.042307733120090826,0.0561423966144687]},{"name":"Weighted","data":[0.023886417250247337,0.05499795350793861,0.04091875993391442,0.032991522614661074,0.026109795359339067,0.031214409667550715]}];
        const chart = echarts.init(document.getElementById('chart'), null, { renderer: 'svg' });

        const palette = ['#2563eb','#059669','#64748b','#dc2626','#7c3aed','#d97706'];

        const option = {
            backgroundColor: 'transparent',
            animation: false,
            tooltip: { trigger: 'axis' },
            legend: { top: '5%', textStyle: { color: '#475569', fontSize: 12 } },
            grid: { left: '10%', right: '10%', top: '20%', bottom: '15%' },
            xAxis: {
                type: 'category',
                data: xAxisData,
                axisLabel: { color: '#475569' },
                nameLocation: 'middle',
                nameGap: 30
            },
            yAxis: {
                type: 'value',
                axisLabel: { color: '#475569' },
                splitLine: { show: true, lineStyle: { color: '#e2e8f0', type: 'dashed' } }
            },
            series: seriesData.map((s, i) => ({
                name: s.name,
                type: 'bar',
                data: s.data,
                itemStyle: { color: palette[i % palette.length], borderRadius: [4, 4, 0, 0] }
            }))
        };
        chart.setOption(option);


    </script>
</body>
</html>
