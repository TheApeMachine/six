<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, initial-scale=1.0">
    <title>CIFAR-10 Reconstruction — Occlusion Scaling Curve</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
         
        @page {
            size: 1200px 800px;
            margin: 0;
        }
        *, *::before, *::after { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            width: 1200px;
            height: 800px;
            overflow: hidden;
            background: transparent;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #0f172a;
        }
        #chart {
            width: 1200px;
            height: 800px;
        }
    </style>
</head>
<body>
    <div id="chart"></div>
    <script>
        const xAxisData = ["10%","20%","30%","40%","50%","60%","70%","80%","90%"];
        const seriesData = [{"name":"Exact","data":[0,0,0,0,0,0,0,0,0]},{"name":"Partial","data":[0.15560975609756098,0.15280487804878048,0.1290480065093572,0.10414887126296521,0.103173828125,0.0017493897477624087,0.10202231520223151,0.1032956972841013,0.028180092215893682]},{"name":"Fuzzy","data":[0.013339368576110861,0.02694257684179613,0.0392565963183443,0.04256720076250124,0.05246384706395487,0.0010706668009947012,0.07240120310375195,0.08343755087226642,0.025469073561058497]},{"name":"Weighted","data":[0.04486436413135496,0.04657270798453943,0.04233247383316002,0.03614372866489984,0.03767719804571907,0.0006717729859342388,0.040988122892199864,0.043342017599712436,0.012316220342708914]}];
        const yMin = 0;
        const yMax = 1;
        const chart = echarts.init(document.getElementById('chart'), null, { renderer: 'svg' });

        const palette = ['#2563eb','#059669','#64748b','#dc2626','#7c3aed','#d97706'];

        const option = {
            backgroundColor: 'transparent',
            animation: false,
            tooltip: { trigger: 'axis' },
            legend: { top: '5%', textStyle: { color: '#475569', fontSize: 12 } },
            grid: { left: '10%', right: '10%', top: '20%', bottom: '15%' },
            xAxis: {
                type: 'category',
                data: xAxisData,
                axisLabel: { color: '#475569' },
                nameLocation: 'middle',
                nameGap: 30
            },
            yAxis: {
                type: 'value',
                min: yMin,
                max: yMax,
                axisLabel: { color: '#475569' },
                splitLine: { show: true, lineStyle: { color: '#e2e8f0', type: 'dashed' } }
            },
            series: seriesData.map((s, i) => {
                const color = palette[i % palette.length];
                return {
                    name: s.name,
                    type: 'line',
                    data: s.data,
                    smooth: true,
                    symbol: 'none',
                    lineStyle: { color, width: 2 },
                    itemStyle: { color }
                };
            })
        };
        chart.setOption(option);


    </script>
</body>
</html>
