<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, initial-scale=1.0">
    <title>CIFAR-10 Reconstruction — Occlusion Scaling Curve</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
         
        @page {
            size: 1200px 800px;
            margin: 0;
        }
        *, *::before, *::after { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            width: 1200px;
            height: 800px;
            overflow: hidden;
            background: transparent;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #0f172a;
        }
        #chart {
            width: 1200px;
            height: 800px;
        }
    </style>
</head>
<body>
    <div id="chart"></div>
    <script>
        const xAxisData = ["10%","20%","30%","40%","50%","60%","70%","80%","90%"];
        const seriesData = [{"name":"Exact","data":[0,0,0,0,0,0,0,0,0]},{"name":"Partial","data":[0.18097560975609756,0.15280487804878048,0.17746135069161922,0.15320317266625988,0.152197265625,0.2527257933279089,0.12726638772663873,0.1523954836740921,0.17797667480336313]},{"name":"Fuzzy","data":[0.01586673605656665,0.026756243757494684,0.051338208139481215,0.05915294754812298,0.07237663046425423,0.14784972861818618,0.08233251261690036,0.1145740691737945,0.15712300751970862]},{"name":"Weighted","data":[0.05224184558012964,0.04653882924193917,0.05773276985034727,0.05253776482682052,0.05466773252759168,0.09580698520182718,0.049678562583065175,0.06239405357907868,0.07710691267722787]}];
        const yMin = 0;
        const yMax = 1;
        const chart = echarts.init(document.getElementById('chart'), null, { renderer: 'svg' });

        const palette = ['#2563eb','#059669','#64748b','#dc2626','#7c3aed','#d97706'];

        const option = {
            backgroundColor: 'transparent',
            animation: false,
            tooltip: { trigger: 'axis' },
            legend: { top: '5%', textStyle: { color: '#475569', fontSize: 12 } },
            grid: { left: '10%', right: '10%', top: '20%', bottom: '15%' },
            xAxis: {
                type: 'category',
                data: xAxisData,
                axisLabel: { color: '#475569' },
                nameLocation: 'middle',
                nameGap: 30
            },
            yAxis: {
                type: 'value',
                min: yMin,
                max: yMax,
                axisLabel: { color: '#475569' },
                splitLine: { show: true, lineStyle: { color: '#e2e8f0', type: 'dashed' } }
            },
            series: seriesData.map((s, i) => {
                const color = palette[i % palette.length];
                return {
                    name: s.name,
                    type: 'line',
                    data: s.data,
                    smooth: true,
                    symbol: 'none',
                    lineStyle: { color, width: 2 },
                    itemStyle: { color }
                };
            })
        };
        chart.setOption(option);


    </script>
</body>
</html>
