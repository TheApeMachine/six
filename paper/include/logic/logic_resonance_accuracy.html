<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transitive Resonance Accuracy across Mikolov Benchmark</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        html, body {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0; 
            padding: 0; 
            background-color: transparent; 
            color: #0f172a; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            width: 100%; 
            height: 100%; 
        }
        #chart { 
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%; 
            height: 100%; 
            background: transparent; 
            padding: 0; 
            box-sizing: border-box; 
        }
    </style>
</head>
<body>
    <div id="chart"></div>
    <script>
        const xAxisData = ["gram8-plural","gram9-plural-verbs","capital-common-countries","capital-world","currency","family","gram1-adjective-to-adverb","gram2-opposite","gram3-comparative","gram4-superlative","city-in-state","gram5-present-participle","gram6-nationality-adjective","gram7-past-tense"];
        const seriesData = [{"name":"Resonant Accuracy (%)","type":"bar","symbol":"","barWidth":"","data":[5,0,0,5,0,0,0,0,0,0,5,0,0,0]}];
        const yMin = 0;
        const yMax = 100;
        const chart = echarts.init(document.getElementById('chart'), null, { renderer: 'svg' });

        const palette = ['#3b82f6','#22c55e','#94a3b8','#ef4444','#a855f7','#f59e0b','#06b6d4','#ec4899'];

        const series = seriesData.map((s, i) => {
            const color = palette[i % palette.length];
            const base = {
                name: s.name,
                data: s.data,
                itemStyle: { color },
                lineStyle: { color }
            };
            if (s.type === 'bar') {
                return { ...base, type: 'bar', barWidth: s.barWidth || '15%', itemStyle: { color, borderRadius: [4, 4, 0, 0] } };
            } else if (s.type === 'dashed') {
                return { ...base, type: 'line', smooth: false, symbol: s.symbol || 'diamond', symbolSize: 6,
                         lineStyle: { color, type: 'dashed', width: 1.5 } };
            } else {
                // default: smooth line
                return { ...base, type: 'line', smooth: true, symbol: s.symbol || 'circle', symbolSize: 4,
                         lineStyle: { color, width: 2 } };
            }
        });

        const option = {
            backgroundColor: 'transparent',
            animation: false,
            tooltip: { trigger: 'axis' },
            legend: {
                top: '3%',
                selectedMode: false,
                textStyle: { color: '#475569', fontSize: 11 }
            },
            grid: { left: '10%', right: '10%', top: '18%', bottom: '15%' },
            xAxis: {
                type: 'category',
                data: xAxisData,
                axisLabel: { color: '#475569' },
                name: 'Analogy Relations',
                nameLocation: 'middle',
                nameGap: 25,
                nameTextStyle: { color: '#475569' }
            },
            yAxis: {
                type: 'value',
                min: yMin,
                max: yMax,
                axisLabel: { color: '#475569' },
                splitLine: { show: true, lineStyle: { color: '#e2e8f0', type: 'dashed' } },
                name: 'Accuracy (%)',
                nameLocation: 'middle',
                nameGap: 35,
                nameTextStyle: { color: '#475569' }
            },
            series
        };
        chart.setOption(option);

    </script>
</body>
</html>
