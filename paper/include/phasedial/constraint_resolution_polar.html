<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1100, initial-scale=1.0">
    <title>Phase-Based Constraint Resolution</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
         
        @page {
            size: 1100px 900px;
            margin: 0;
        }
        *, *::before, *::after { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            width: 1100px;
            height: 900px;
            overflow: hidden;
            background: transparent;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #0f172a;
        }
        #chart {
            width: 1100px;
            height: 900px;
        }
    </style>
</head>
<body>
    <div id="chart"></div>
    <script>

const snapshots = [{"title":"Two suspects, shared clue","points":[{"label":"BUTLER","angle":0,"radius":0.15,"color":"#3b82f6"},{"label":"GARDENER","angle":45,"radius":0.15,"color":"#ec4899"},{"label":"MAID","angle":90,"radius":0.15,"color":"#8b5cf6"},{"label":"CHEF","angle":135,"radius":0.15,"color":"#10b981"},{"label":"EVIDENCE","angle":0,"radius":0.5,"color":"#1e293b"},{"label":"MID","angle":22.5,"radius":0.1,"color":"#64748b"}],"channels":[0,45,90,135]},{"title":"Alibis shift the suspects","points":[{"label":"BUTLER","angle":0,"radius":0.15,"color":"#3b82f6"},{"label":"GARDENER","angle":45,"radius":0.15,"color":"#ec4899"},{"label":"MAID","angle":90,"radius":1,"color":"#8b5cf6"},{"label":"CHEF","angle":135,"radius":0.15,"color":"#10b981"},{"label":"EVIDENCE","angle":90,"radius":1,"color":"#1e293b"},{"label":"MID","angle":45,"radius":0.102734375,"color":"#64748b"}],"channels":[0,45,90,135]},{"title":"Rule out one suspect (destructive interference)","points":[{"label":"BUTLER","angle":0,"radius":0.15,"color":"#3b82f6"},{"label":"GARDENER","angle":45,"radius":0.15,"color":"#ec4899"},{"label":"MAID","angle":90,"radius":0.15,"color":"#8b5cf6"},{"label":"CHEF","angle":135,"radius":0.15,"color":"#10b981"},{"label":"EVIDENCE","angle":0,"radius":0.5,"color":"#1e293b"},{"label":"MID","angle":22.5,"radius":0.1,"color":"#64748b"}],"channels":[0,45,90,135]},{"title":"Hard evidence confirms the final suspect","points":[{"label":"BUTLER","angle":0,"radius":0.15,"color":"#3b82f6"},{"label":"GARDENER","angle":45,"radius":0.15,"color":"#ec4899"},{"label":"MAID","angle":90,"radius":0.15,"color":"#8b5cf6"},{"label":"CHEF","angle":135,"radius":0.15,"color":"#10b981"},{"label":"EVIDENCE","angle":0,"radius":0.5,"color":"#1e293b"},{"label":"MID","angle":22.5,"radius":0.1,"color":"#64748b"}],"channels":[0,45,90,135]}];

const chart = echarts.init(document.getElementById('chart'), null, { renderer: 'svg' });

const centres = [
    { cx: '25%', cy: '27%' },
    { cx: '75%', cy: '27%' },
    { cx: '25%', cy: '77%' },
    { cx: '75%', cy: '77%' }
];
const radius = '38%';

const polarAxes = [];
const angleAxes = [];
const polars    = [];
const seriesArr = [];
const titlesArr = [];

const SUSPECT_COLORS = ['#3b82f6', '#ec4899', '#8b5cf6', '#10b981'];
const EVIDENCE_COLOR = '#1e293b';

snapshots.forEach((snap, si) => {
    const c = centres[si];
    polars.push({ center: [c.cx, c.cy], radius: radius });

    polarAxes.push({
        id: si, polarIndex: si, min: 0, max: 1, splitNumber: 4,
        axisLine: { lineStyle: { color: '#94a3b8' } },
        splitLine: { lineStyle: { color: '#e2e8f0', type: 'dashed' } },
        axisLabel: { color: '#64748b', fontSize: 9,
            formatter: v => v.toFixed(2) }
    });
    angleAxes.push({
        id: si, polarIndex: si, type: 'value',
        min: 0, max: 360, interval: 45,
        startAngle: 90,
        axisLine: { show: true, lineStyle: { color: '#94a3b8' } },
        axisTick: { show: true },
        axisLabel: { color: '#64748b', fontSize: 9,
            formatter: v => v + '°' }
    });

    if (snap.title) {
        titlesArr.push({
            text: '(' + String.fromCharCode(65 + si) + ')  ' + snap.title,
            left: si % 2 === 0 ? '2%' : '52%',
            top:  si < 2 ? '2%' : '52%',
            textStyle: { color: '#0f172a', fontSize: 12, fontWeight: 'normal' }
        });
    }

    // Channel indicator lines — thin grey radials at fixed angles.
    (snap.channels || []).forEach((angleDeg, ci) => {
        seriesArr.push({
            type: 'line',
            coordinateSystem: 'polar',
            polarIndex: si,
            name: '_ch' + si + '_' + ci,
            data: [[0, angleDeg], [1, angleDeg]],
            lineStyle: { color: '#94a3b8', width: 1 },
            symbol: 'none', silent: true, legendHoverLink: false
        });
    });

    // One scatter dot per entity.
    snap.points.forEach((pt, pi) => {
        const isSpecial = pt.label === 'EVIDENCE' || pt.label === 'MID';
        const color = pt.color || (isSpecial ? EVIDENCE_COLOR
                                             : SUSPECT_COLORS[pi % SUSPECT_COLORS.length]);
        seriesArr.push({
            type: 'scatter',
            coordinateSystem: 'polar',
            polarIndex: si,
            name: pt.label,
            data: [[pt.radius, pt.angle]],
            symbolSize: isSpecial ? 14 : 18,
            itemStyle: { color },
            label: {
                show: true,
                formatter: pt.label,
                position: 'right',
                color: color,
                fontSize: 11,
                fontWeight: 'bold'
            }
        });
    });
});

chart.setOption({
    backgroundColor: 'transparent',
    animation:  false,
    title:      titlesArr,
    polar:      polars,
    radiusAxis: polarAxes,
    angleAxis:  angleAxes,
    series:     seriesArr,
    legend:     { show: false }
});

    </script>
</body>
</html>
