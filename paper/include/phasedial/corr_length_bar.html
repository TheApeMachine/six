<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correlation Length Exploitation: Gain by Split</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        html, body {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0; 
            padding: 0; 
            background-color: transparent; 
            color: #0f172a; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            width: 100%; 
            height: 100%; 
        }
        #chart { 
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%; 
            height: 100%; 
            background: transparent; 
            padding: 0; 
            box-sizing: border-box; 
        }
    </style>
</head>
<body>
    <div id="chart"></div>
    <script>
        const xAxisData = ["192/320","224/288","256/256","288/224","320/192","320∩192 (overlap 128)"];
        const seriesData = [{"name":"Best Gain","data":[0.13297593189643192,0.13297593189643192,0.14167383518538249,0.13297593189643192,0.14167383518538249,0.13297593189643192]}];
        const chart = echarts.init(document.getElementById('chart'), null, { renderer: 'svg' });

        const palette = ['#2563eb','#059669','#64748b','#dc2626','#7c3aed','#d97706'];

        const option = {
            backgroundColor: 'transparent',
            animation: false,
            tooltip: { trigger: 'axis' },
            legend: { top: '5%', textStyle: { color: '#475569', fontSize: 12 } },
            grid: { left: '10%', right: '10%', top: '20%', bottom: '15%' },
            xAxis: {
                type: 'category',
                data: xAxisData,
                axisLabel: { color: '#475569' },
                nameLocation: 'middle',
                nameGap: 30
            },
            yAxis: {
                type: 'value',
                axisLabel: { color: '#475569' },
                splitLine: { show: true, lineStyle: { color: '#e2e8f0', type: 'dashed' } }
            },
            series: seriesData.map((s, i) => ({
                name: s.name,
                type: 'bar',
                data: s.data,
                itemStyle: { color: palette[i % palette.length], borderRadius: [4, 4, 0, 0] }
            }))
        };
        chart.setOption(option);


    </script>
</body>
</html>
