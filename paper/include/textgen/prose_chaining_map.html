                xAxes.push({ gridIndex: pi, show: false, type: 'category', data: [] });

                const yOpts = {
                    gridIndex: pi,
                    type: 'value',
                    axisLabel: { color: '#475569' },
                    splitLine: { show: true, lineStyle: { color: '#e2e8f0', type: 'dashed' } },
                    name: panel.yAxisName || '',
                    nameLocation: 'middle',
                    nameGap: 40,
                    nameTextStyle: { color: '#475569' }
                };
                if (panel.yMin != null) yOpts.min = panel.yMin;
                if (panel.yMax != null) yOpts.max = panel.yMax;
                yAxes.push(yOpts);
                yAxes.push({ gridIndex: pi, show: false });

                (panel.series || []).forEach((s, si) => {
                    const color = s.color || SERIES_COLORS[si % SERIES_COLORS.length];
                    legendItems.push(s.name);

                    if (s.kind === 'bar') {
                        series.push({
                            name: s.name,
                            type: 'bar',
                            xAxisIndex: pi * 2,
                            yAxisIndex: pi * 2,
                            data: s.data,
                            barWidth: s.barWidth || '20%',
                            itemStyle: { color, borderRadius: [4, 4, 0, 0] }
                        });
                    } else if (s.kind === 'dashed') {
                        series.push({
                            name: s.name,
                            type: 'line',
                            xAxisIndex: pi * 2,
                            yAxisIndex: pi * 2,
                            data: s.data,
                            smooth: false,
                            symbol: s.symbol || 'diamond',
                            symbolSize: 6,
                            lineStyle: { color, type: 'dashed', width: 1.5 },
                            itemStyle: { color }
                        });
                    } else if (s.kind === 'dotted') {
                        series.push({
                            name: s.name,
                            type: 'line',
                            xAxisIndex: pi * 2,
                            yAxisIndex: pi * 2,
                            data: s.data,
                            smooth: false,
                            symbol: s.symbol || 'circle',
                            symbolSize: 4,
                            lineStyle: { color, type: 'dotted', width: 2 },
                            itemStyle: { color }
                        });
                    } else {
                        // smooth line (default)
                        const base = {
                            name: s.name,
                            type: 'line',
                            xAxisIndex: pi * 2,
                            yAxisIndex: pi * 2,
                            data: s.data,
                            smooth: true,
                            symbol: s.symbol || 'none',
                            symbolSize: 4,
                            lineStyle: { color, width: 2 },
                            itemStyle: { color }
                        };
                        if (s.area) base.areaStyle = { opacity: 0.1, origin: 0, color };
                        series.push(base);
                    }
                });
            }
        });

        chart.setOption({
            backgroundColor: 'transparent',
            animation: false,
            tooltip:  { position: 'top' },
            title:    titles,
            grid:     grids,
            xAxis:    xAxes,
            yAxis:    yAxes,
            series:   series,
            visualMap: visualMaps,
            legend: {
                data: legendItems,
                selectedMode: false,
                top:   '1%',
                right: '2%',
                textStyle: { color: '#475569', fontSize: 11 }
            }
        });

    </script>
</body>
</html>
