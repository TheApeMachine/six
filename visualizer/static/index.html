<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cortex Geometry Visualizer</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #050510;
      font-family: 'Courier New', Courier, monospace;
      color: #bbbbff;
    }
    canvas { display: block; }
    #hud {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 100;
      pointer-events: none;
    }
    .hud-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #ffffff;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }
    .hud-stat {
      font-size: 14px;
      margin-bottom: 5px;
      opacity: 0.8;
    }
    #log-container {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 400px;
      height: 200px;
      overflow: hidden;
      display: flex;
      flex-direction: column-reverse;
      font-size: 12px;
      opacity: 0.6;
      pointer-events: none;
    }
    .log-line {
      white-space: pre-wrap;
      margin-top: 4px;
      animation: fadein 0.2s ease-in;
    }
    @keyframes fadein {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .log-insert { color: #00ffaa; }
    .log-evaluate { color: #ff55ff; }
    .log-state { color: #5555ff; }
  </style>
</head>
<body>

  <div id="hud">
    <div class="hud-title">Cortex Resonance</div>
    <div id="stat-paths" class="hud-stat">Active Paths: 0</div>
    <div id="stat-residue" class="hud-stat">Last Residue: N/A</div>
    <div id="stat-edges" class="hud-stat">LSM Edges: 0</div>
  </div>

  <div id="log-container"></div>

  <!-- Three.js from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
    // -------------------------------------------------------------
    // Three.js Setup
    // -------------------------------------------------------------
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x050510, 0.002);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 50;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Particle System (Represents Chords/Active Bits)
    const particleGeometry = new THREE.BufferGeometry();
    const maxParticles = 50000;
    const positions = new Float32Array(maxParticles * 3);
    const colors = new Float32Array(maxParticles * 3);
    const sizes = new Float32Array(maxParticles);

    // Initialize invisible particles
    for(let i=0; i<maxParticles; i++) {
        positions[i*3] = (Math.random() - 0.5) * 500;
        positions[i*3+1] = (Math.random() - 0.5) * 500;
        positions[i*3+2] = (Math.random() - 0.5) * 500;
        colors[i*3] = 0.5; colors[i*3+1] = 0.5; colors[i*3+2] = 1.0;
        sizes[i] = 0;
    }
    
    particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    particleGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

    const particleMaterial = new THREE.PointsMaterial({
        size: 2,
        vertexColors: true,
        blending: THREE.AdditiveBlending,
        transparent: true,
        opacity: 0.8,
    });

    const particleSystem = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particleSystem);

    let particleIndex = 0;

    // Rings/Spheres for geometric resonance pulses
    const rings = [];

    // Animation Loop
    function animate() {
      requestAnimationFrame(animate);

      // Rotate the entire particle cloud slowly
      particleSystem.rotation.y += 0.001;
      particleSystem.rotation.x += 0.0005;

      // Pulse and fade rings
      for (let i = rings.length - 1; i >= 0; i--) {
          const r = rings[i];
          r.scale.addScalar(0.05);
          r.material.opacity -= 0.01;
          if (r.material.opacity <= 0) {
              scene.remove(r);
              rings.splice(i, 1);
          }
      }

      renderer.render(scene, camera);
    }
    animate();

    // Resize Handler
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // -------------------------------------------------------------
    // HUD & Logic Updates
    // -------------------------------------------------------------
    const logBox = document.getElementById('log-container');
    const statPaths = document.getElementById('stat-paths');
    const statResidue = document.getElementById('stat-residue');
    const statEdges = document.getElementById('stat-edges');

    function logMessage(text, type) {
        const div = document.createElement('div');
        div.className = `log-line log-${type}`;
        div.innerText = `[${new Date().toISOString().split('T')[1].slice(0,-1)}] ${text}`;
        logBox.insertBefore(div, logBox.firstChild);
        if (logBox.children.length > 20) {
            logBox.removeChild(logBox.lastChild);
        }
    }

    function createResonancePulse(colorHex) {
        const geo = new THREE.RingGeometry(0.1, 0.5, 32);
        const mat = new THREE.MeshBasicMaterial({ 
            color: colorHex, 
            side: THREE.DoubleSide, 
            transparent: true, 
            blending: THREE.AdditiveBlending 
        });
        const mesh = new THREE.Mesh(geo, mat);
        
        // Randomize location slightly around center
        mesh.position.set(
            (Math.random()-0.5)*10, 
            (Math.random()-0.5)*10, 
            (Math.random()-0.5)*10
        );
        mesh.lookAt(camera.position);
        
        scene.add(mesh);
        rings.push(mesh);
    }

    function spawnParticle(type) {
        const posAttr = particleGeometry.attributes.position;
        const sizeAttr = particleGeometry.attributes.size;
        const colAttr = particleGeometry.attributes.color;

        // Cluster towards center
        const r = Math.random() * 20;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos((Math.random() * 2) - 1);
        
        const i = particleIndex % maxParticles;
        posAttr.array[i*3]   = r * Math.sin(phi) * Math.cos(theta);
        posAttr.array[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
        posAttr.array[i*3+2] = r * Math.cos(phi);

        sizeAttr.array[i] = 1.0;

        if (type === 'insert') {
            colAttr.array[i*3] = 0; colAttr.array[i*3+1] = 1; colAttr.array[i*3+2] = 0.5; // Teal/Green
        } else {
            colAttr.array[i*3] = 1; colAttr.array[i*3+1] = 0.2; colAttr.array[i*3+2] = 1; // Pink/Magenta
        }

        posAttr.needsUpdate = true;
        sizeAttr.needsUpdate = true;
        colAttr.needsUpdate = true;

        particleIndex++;
    }

    // -------------------------------------------------------------
    // WebSocket Connection
    // -------------------------------------------------------------
    const ws = new WebSocket(`ws://${window.location.host}/ws`);

    ws.onmessage = (event) => {
        try {
            const update = JSON.parse(event.data);
            
            // Expected Update shape:
            // { component: "Cortex", action: "Evaluate", data: { residue: 12, paths: 4000 } }
            // { component: "LSM", action: "Insert", data: { edges: 15302 } }
            
            if (update.component === "Cortex") {
                if (update.action === "Evaluate") {
                    createResonancePulse(0xff00ff); // Magenta flash for geometric evaluation
                    statResidue.innerText = `Last Residue: ${update.data.residue}`;
                    logMessage(`Evaluated Matrix. Residue: ${update.data.residue}`, 'evaluate');
                } else if (update.action === "Insert") {
                    for(let k=0; k<10; k++) spawnParticle('evaluate');
                    statPaths.innerText = `Active Paths: ${update.data.paths}`;
                    logMessage(`Inserted Path Chord. Total: ${update.data.paths}`, 'state');
                }
            } else if (update.component === "LSM") {
                if (update.action === "Insert") {
                    for(let k=0; k<5; k++) spawnParticle('insert');
                    statEdges.innerText = `LSM Edges: ${update.data.edges}`;
                    logMessage(`Inserted Edge. Total Graph Edges: ${update.data.edges}`, 'insert');
                }
            }

        } catch (e) {
            console.error("Failed to parse update:", event.data);
        }
    };

    ws.onopen = () => logMessage("Connected to Cortex Telemetry.", "state");
    ws.onclose = () => logMessage("Disconnected. System Offline.", "state");
    
  </script>
</body>
</html>
