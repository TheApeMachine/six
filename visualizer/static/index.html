<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SIX — Chord Geometry Visualizer</title>
  <meta name="description" content="Real-time 3D visualization of the 257-bit chord space and geometric inference engine">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #030308;
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      color: #aab;
    }
    canvas { display: block; }

    #hud {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 100;
      pointer-events: none;
    }
    .hud-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #fff;
      opacity: 0.5;
      margin-bottom: 16px;
    }
    .hud-stat {
      font-size: 12px;
      margin-bottom: 6px;
      opacity: 0.7;
    }
    .hud-stat .val { color: #7df; font-weight: bold; }
    .hud-stat .warn { color: #fa4; }
    .hud-stat .hot { color: #f44; }

    #info-panel {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 320px;
      z-index: 100;
      pointer-events: none;
    }
    #chunk-text {
      font-size: 11px;
      padding: 12px;
      background: rgba(10, 10, 30, 0.85);
      border: 1px solid rgba(100, 120, 255, 0.15);
      border-radius: 6px;
      line-height: 1.6;
      max-height: 160px;
      overflow: hidden;
      word-break: break-all;
      margin-bottom: 12px;
    }
    #eval-panel {
      font-size: 11px;
      padding: 12px;
      background: rgba(10, 10, 30, 0.85);
      border: 1px solid rgba(255, 100, 255, 0.15);
      border-radius: 6px;
      line-height: 1.6;
      display: none;
    }
    .label { color: #668; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .cancel-count { color: #0fa; font-size: 20px; font-weight: bold; }
    .residue-count { color: #f4f; font-size: 20px; font-weight: bold; }

    #log-container {
      position: absolute;
      bottom: 24px;
      left: 24px;
      width: 480px;
      max-height: 180px;
      overflow: hidden;
      display: flex;
      flex-direction: column-reverse;
      font-size: 11px;
      opacity: 0.5;
      pointer-events: none;
    }
    .log-line {
      white-space: pre-wrap;
      margin-top: 3px;
      animation: slide-in 0.15s ease-out;
    }
    @keyframes slide-in {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .log-chord    { color: #7df; }
    .log-evaluate { color: #f4f; }
    .log-boundary { color: #fa4; }
    .log-state    { color: #668; }

    #density-bar {
      position: absolute;
      bottom: 24px;
      right: 24px;
      width: 12px;
      height: 200px;
      background: rgba(20, 20, 40, 0.8);
      border-radius: 6px;
      border: 1px solid rgba(100, 120, 255, 0.1);
      overflow: hidden;
    }
    #density-fill {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: linear-gradient(to top, #0af, #0fa);
      border-radius: 0 0 5px 5px;
      transition: height 0.2s ease, background 0.3s;
    }
    #density-label {
      position: absolute;
      bottom: 208px;
      right: 24px;
      font-size: 10px;
      color: #668;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #density-ceiling {
      position: absolute;
      bottom: 0;
      right: 24px;
      width: 12px;
      height: 200px;
      pointer-events: none;
    }
    #density-ceiling::after {
      content: '40%';
      position: absolute;
      bottom: 80px;
      right: 18px;
      font-size: 9px;
      color: #fa4;
      opacity: 0.5;
    }
    #density-ceiling-line {
      position: absolute;
      bottom: 80px;
      width: 12px;
      height: 1px;
      background: #fa4;
      opacity: 0.6;
    }

    /* ── Hover tooltip ─────────────────────────────────────── */
    #tooltip {
      position: absolute;
      z-index: 200;
      pointer-events: none;
      display: none;
      background: rgba(8, 8, 24, 0.95);
      border: 1px solid rgba(100, 140, 255, 0.3);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 11px;
      line-height: 1.5;
      max-width: 300px;
      word-break: break-all;
      backdrop-filter: blur(8px);
    }
    #tooltip .tt-label { color: #668; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; }
    #tooltip .tt-text { color: #ddf; margin-top: 4px; }
    #tooltip .tt-state { color: #0fa; margin-top: 4px; font-weight: bold; }
    #tooltip .tt-bits { color: #7df; margin-top: 4px; font-size: 10px; }
    #tooltip .tt-group { color: #c8f; margin-top: 4px; }

    /* ── CSS2D label classes ────────────────────────────────── */
    .group-label {
      color: #c8f;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 8px rgba(200, 128, 255, 0.4);
      pointer-events: none;
      white-space: nowrap;
    }
    .chord-label {
      color: #7df;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 9px;
      opacity: 0.7;
      pointer-events: none;
      white-space: nowrap;
    }
    .chord-label.state-stored { color: #7df; }
    .chord-label.state-matched { color: #0fa; }
    .chord-label.state-active { color: #ff0; }
  </style>
</head>
<body>

  <div id="hud">
    <div class="hud-title">SIX · Chord Space</div>
    <div id="stat-chunks" class="hud-stat">Chunks: <span class="val">0</span></div>
    <div id="stat-groups" class="hud-stat">Groups: <span class="val">0</span></div>
    <div id="stat-edges" class="hud-stat">LSM Edges: <span class="val">0</span></div>
    <div id="stat-density" class="hud-stat">Density: <span class="val">0%</span></div>
    <div id="stat-active" class="hud-stat">Active Bits: <span class="val">0</span> / 257</div>
    <div id="stat-conn" class="hud-stat">Status: <span class="val">offline</span></div>
  </div>

  <div id="info-panel">
    <div id="chunk-text">
      <div class="label">Current Chunk</div>
      <span id="chunk-content">—</span>
    </div>
    <div id="eval-panel">
      <div class="label">XOR Evaluation</div>
      <div>Cancelled: <span class="cancel-count" id="cancel-count">0</span> bits</div>
      <div>Residue: <span class="residue-count" id="residue-count">0</span> bits</div>
    </div>
  </div>

  <div id="tooltip">
    <div class="tt-label">Chord</div>
    <div class="tt-text" id="tt-text"></div>
    <div class="tt-state" id="tt-state"></div>
    <div class="tt-bits" id="tt-bits"></div>
    <div class="tt-group" id="tt-group"></div>
  </div>

  <div id="log-container"></div>

  <div id="density-label">Density</div>
  <div id="density-bar"><div id="density-fill" style="height: 0%"></div></div>
  <div id="density-ceiling"><div id="density-ceiling-line"></div></div>

  <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/" } }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ── Scene ──────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x030308, 0.006);

    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 500);
    camera.position.set(0, 18, 45);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    // CSS2D renderer for text labels in 3D space
    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(innerWidth, innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.3;

    // ── Raycaster for hover ────────────────────────────────────────
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const tooltip = document.getElementById('tooltip');

    // ── Constants ──────────────────────────────────────────────────
    const BITS = 257;
    const R_MAJOR = 14;
    const R_MINOR = 5;
    const GROUP_Y = 14;        // Group labels float above
    const GROUP_RADIUS = 12;   // Group ring radius
    const MAX_CHORD_NODES = 40;

    // ── 257-Bit Torus Layout ───────────────────────────────────────
    function bitToPosition(bitIdx) {
      const u = (bitIdx / BITS) * Math.PI * 2;
      const v = ((bitIdx * 7) % BITS) / BITS * Math.PI * 2;
      return new THREE.Vector3(
        (R_MAJOR + R_MINOR * Math.cos(v)) * Math.cos(u),
        R_MINOR * Math.sin(v),
        (R_MAJOR + R_MINOR * Math.cos(v)) * Math.sin(u)
      );
    }

    // ── Torus wireframe ────────────────────────────────────────────
    const torusGeo = new THREE.TorusGeometry(R_MAJOR, R_MINOR, 32, 64);
    const torusMat = new THREE.MeshBasicMaterial({
      color: 0x1a1a3a, wireframe: true, transparent: true, opacity: 0.08,
    });
    scene.add(new THREE.Mesh(torusGeo, torusMat));

    // ── Bit markers (257 spheres on torus) ─────────────────────────
    const bitMeshes = [];
    const bitGeo = new THREE.SphereGeometry(0.12, 8, 8);
    const bitMatOff = new THREE.MeshBasicMaterial({ color: 0x111133, transparent: true, opacity: 0.15 });

    for (let i = 0; i < BITS; i++) {
      const mesh = new THREE.Mesh(bitGeo, bitMatOff.clone());
      mesh.position.copy(bitToPosition(i));
      scene.add(mesh);
      bitMeshes.push(mesh);
    }

    // ── Connection lines ───────────────────────────────────────────
    const lineGroup = new THREE.Group();
    scene.add(lineGroup);

    // ── LSM Ring (256 byte positions) ──────────────────────────────
    const LSM_RADIUS = 8;
    const LSM_Y = -8;
    const lsmGroup = new THREE.Group();
    scene.add(lsmGroup);

    const lsmByteMeshes = [];
    const lsmByteGeo = new THREE.SphereGeometry(0.08, 6, 6);
    const lsmByteMat = new THREE.MeshBasicMaterial({ color: 0x221144, transparent: true, opacity: 0.3 });

    for (let i = 0; i < 256; i++) {
      const angle = (i / 256) * Math.PI * 2;
      const mesh = new THREE.Mesh(lsmByteGeo, lsmByteMat.clone());
      mesh.position.set(LSM_RADIUS * Math.cos(angle), LSM_Y, LSM_RADIUS * Math.sin(angle));
      lsmGroup.add(mesh);
      lsmByteMeshes.push(mesh);
    }

    const lsmRingGeo = new THREE.RingGeometry(LSM_RADIUS - 0.05, LSM_RADIUS + 0.05, 128);
    const lsmRingMat = new THREE.MeshBasicMaterial({ color: 0x1a0a3a, side: THREE.DoubleSide, transparent: true, opacity: 0.15 });
    const lsmRingMesh = new THREE.Mesh(lsmRingGeo, lsmRingMat);
    lsmRingMesh.rotation.x = -Math.PI / 2;
    lsmRingMesh.position.y = LSM_Y;
    lsmGroup.add(lsmRingMesh);

    const lsmEdgeGroup = new THREE.Group();
    lsmGroup.add(lsmEdgeGroup);

    function lsmBytePosition(byteVal) {
      const angle = (byteVal / 256) * Math.PI * 2;
      return new THREE.Vector3(LSM_RADIUS * Math.cos(angle), LSM_Y, LSM_RADIUS * Math.sin(angle));
    }

    function drawLSMEdge(left, right) {
      const p1 = lsmBytePosition(left);
      const p2 = lsmBytePosition(right);
      const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
      mid.y = LSM_Y + 1.5;

      const curve = new THREE.QuadraticBezierCurve3(p1, mid, p2);
      const pts = curve.getPoints(16);
      const geo = new THREE.BufferGeometry().setFromPoints(pts);
      const mat = new THREE.LineBasicMaterial({ color: 0x6622aa, transparent: true, opacity: 0.15, blending: THREE.AdditiveBlending });
      lsmEdgeGroup.add(new THREE.Line(geo, mat));

      if (lsmEdgeGroup.children.length > 500) {
        const old = lsmEdgeGroup.children[0];
        lsmEdgeGroup.remove(old);
        old.geometry.dispose();
        old.material.dispose();
      }

      lsmByteMeshes[left].material.color.setHex(0x8844ff);
      lsmByteMeshes[left].material.opacity = 0.8;
      lsmByteMeshes[right].material.color.setHex(0x8844ff);
      lsmByteMeshes[right].material.opacity = 0.8;
    }

    // ── GROUP LABELS (top layer) ───────────────────────────────────
    // Groups are ChordBin buckets (0-255). Each group gets a label
    // floating above the torus, with chord nodes hanging below it.
    const groups = new Map();       // bin -> { label, meshes[], chords[], count }
    const groupLayer = new THREE.Group();
    scene.add(groupLayer);

    // Group ring wireframe
    const groupRingGeo = new THREE.RingGeometry(GROUP_RADIUS - 0.03, GROUP_RADIUS + 0.03, 128);
    const groupRingMat = new THREE.MeshBasicMaterial({ color: 0x2a0a4a, side: THREE.DoubleSide, transparent: true, opacity: 0.1 });
    const groupRingMesh = new THREE.Mesh(groupRingGeo, groupRingMat);
    groupRingMesh.rotation.x = -Math.PI / 2;
    groupRingMesh.position.y = GROUP_Y;
    groupLayer.add(groupRingMesh);

    function groupPosition(bin) {
      const angle = (bin / 256) * Math.PI * 2;
      return new THREE.Vector3(GROUP_RADIUS * Math.cos(angle), GROUP_Y, GROUP_RADIUS * Math.sin(angle));
    }

    function getOrCreateGroup(bin) {
      if (groups.has(bin)) return groups.get(bin);

      const pos = groupPosition(bin);

      // Group marker sphere
      const markerGeo = new THREE.OctahedronGeometry(0.3, 0);
      const markerMat = new THREE.MeshBasicMaterial({ color: 0xcc88ff, transparent: true, opacity: 0.6 });
      const marker = new THREE.Mesh(markerGeo, markerMat);
      marker.position.copy(pos);
      groupLayer.add(marker);

      // Only create CSS2D labels for the first 24 groups to limit DOM overhead
      let labelObj = null;
      let labelDiv = null;

      if (groups.size < 24) {
        labelDiv = document.createElement('div');
        labelDiv.className = 'group-label';
        labelDiv.textContent = `G${bin}`;
        labelObj = new CSS2DObject(labelDiv);
        labelObj.position.copy(pos);
        labelObj.position.y += 1.2;
        groupLayer.add(labelObj);
      }

      const group = { marker, label: labelObj, labelDiv, chords: [], count: 0, pos };
      groups.set(bin, group);
      return group;
    }

    // ── CHORD NODES (individual chords attached to groups) ──────────
    const chordNodeGeo = new THREE.SphereGeometry(0.15, 8, 8);
    const chordNodes = [];   // { mesh, chordId, bin, state, text, bits }
    const chordNodeGroup = new THREE.Group();
    scene.add(chordNodeGroup);

    function addChordNode(chordId, bin, state, text, bits, density) {
      const group = getOrCreateGroup(bin);
      group.count++;
      group.chords.push({ id: chordId, text, state });

      // Update group label with count and representative text
      if (group.labelDiv) {
        const shortText = group.chords[0].text.trim().slice(0, 12);
        group.labelDiv.textContent = `G${bin} (${group.count}) "${shortText}…"`;
      }

      // Position: scatter around the group, slightly below
      const angle = (group.count * 2.399) % (Math.PI * 2);
      const r = Math.sqrt(Math.min(group.count, 12)) * 0.4;
      const offset = new THREE.Vector3(
        r * Math.cos(angle),
        -1.5 - Math.min(group.count, 8) * 0.15,
        r * Math.sin(angle)
      );

      const stateColor = state === 'matched' ? 0x00ffaa : state === 'active' ? 0xffff00 : 0x44aaff;
      const mat = new THREE.MeshBasicMaterial({ color: stateColor, transparent: true, opacity: 0.6 });
      const mesh = new THREE.Mesh(chordNodeGeo, mat);
      mesh.position.copy(group.pos).add(offset);
      chordNodeGroup.add(mesh);

      // NO CSS2D per chord — state shown via hover tooltip only
      const node = { mesh, chordId, bin, state, text, bits, density };
      chordNodes.push(node);
      mesh.userData = node;

      // Line to group
      const lineGeo = new THREE.BufferGeometry().setFromPoints([group.pos, mesh.position]);
      const lineMat = new THREE.LineBasicMaterial({ color: 0x442266, transparent: true, opacity: 0.2 });
      chordNodeGroup.add(new THREE.Line(lineGeo, lineMat));

      // Evict oldest chord nodes
      if (chordNodes.length > MAX_CHORD_NODES) {
        const old = chordNodes.shift();
        // Remove mesh and its children from the group
        chordNodeGroup.remove(old.mesh);
        old.mesh.geometry.dispose();
        old.mesh.material.dispose();
      }
    }

    // ── Ambient + point lights ─────────────────────────────────────
    scene.add(new THREE.AmbientLight(0x334466, 0.3));

    // ── Bit manipulation ───────────────────────────────────────────
    const COLOR_ACTIVE  = new THREE.Color(0x00aaff);
    const COLOR_CANCEL  = new THREE.Color(0x00ffaa);
    const COLOR_OFF     = new THREE.Color(0x111133);

    function resetBits() {
      for (const mesh of bitMeshes) {
        mesh.material.color.copy(COLOR_OFF);
        mesh.material.opacity = 0.15;
        mesh.scale.setScalar(1);
      }
      lineGroup.clear();
    }

    function activateBits(bits, color, scale = 2.5) {
      for (const b of bits) {
        if (b >= 0 && b < BITS) {
          bitMeshes[b].material.color.copy(color);
          bitMeshes[b].material.opacity = 0.9;
          bitMeshes[b].scale.setScalar(scale);
        }
      }
    }

    function drawConnections(bits, color) {
      if (bits.length < 2) return;
      const points = bits.filter(b => b >= 0 && b < BITS).map(b => bitToPosition(b));
      if (points.length < 2) return;

      const geo = new THREE.BufferGeometry().setFromPoints(points);
      const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.25, blending: THREE.AdditiveBlending });
      lineGroup.add(new THREE.Line(geo, mat));
    }

    // ── Pulses ─────────────────────────────────────────────────────
    const pulses = [];

    function createPulse(position, color) {
      const geo = new THREE.RingGeometry(0.1, 0.4, 24);
      const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.8, side: THREE.DoubleSide, blending: THREE.AdditiveBlending });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.copy(position);
      mesh.lookAt(camera.position);
      scene.add(mesh);
      pulses.push(mesh);
    }

    // ── HUD ────────────────────────────────────────────────────────
    const logBox = document.getElementById('log-container');
    const statChunks = document.querySelector('#stat-chunks .val');
    const statGroups = document.querySelector('#stat-groups .val');
    const statDensity = document.querySelector('#stat-density .val');
    const statActive = document.querySelector('#stat-active .val');
    const statConn = document.querySelector('#stat-conn .val');
    const chunkContent = document.getElementById('chunk-content');
    const evalPanel = document.getElementById('eval-panel');
    const cancelCount = document.getElementById('cancel-count');
    const residueCount = document.getElementById('residue-count');
    const densityFill = document.getElementById('density-fill');

    function log(text, type = 'state') {
      const div = document.createElement('div');
      div.className = `log-line log-${type}`;
      const t = new Date().toISOString().split('T')[1].slice(0, -1);
      div.textContent = `${t} ${text}`;
      logBox.insertBefore(div, logBox.firstChild);
      if (logBox.children.length > 30) logBox.removeChild(logBox.lastChild);
    }

    function updateDensity(d) {
      const pct = Math.min(d * 100, 100);
      densityFill.style.height = `${pct * 2}px`;

      if (d > 0.40) {
        densityFill.style.background = 'linear-gradient(to top, #f44, #fa4)';
        statDensity.className = 'val hot';
      } else if (d > 0.25) {
        densityFill.style.background = 'linear-gradient(to top, #fa4, #ff0)';
        statDensity.className = 'val warn';
      } else {
        densityFill.style.background = 'linear-gradient(to top, #0af, #0fa)';
        statDensity.className = 'val';
      }
      statDensity.textContent = `${pct.toFixed(1)}%`;
    }

    // ── Hover / Raycasting ─────────────────────────────────────────
    window.addEventListener('mousemove', (e) => {
      mouse.x = (e.clientX / innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(chordNodeGroup.children, false);

      if (intersects.length > 0) {
        const obj = intersects[0].object;
        const data = obj.userData;

        if (data && data.text) {
          tooltip.style.display = 'block';
          tooltip.style.left = `${e.clientX + 16}px`;
          tooltip.style.top = `${e.clientY + 16}px`;

          document.getElementById('tt-text').textContent = `"${data.text.trim()}"`;
          document.getElementById('tt-state').textContent = `State: ${data.state}`;
          document.getElementById('tt-bits').textContent = `Active: ${data.bits?.length || 0} / 257 (${((data.density || 0) * 100).toFixed(1)}%)`;
          document.getElementById('tt-group').textContent = `Group: G${data.bin}`;
        }
      } else {
        tooltip.style.display = 'none';
      }
    });

    // ── WebSocket ──────────────────────────────────────────────────
    function connect() {
      const ws = new WebSocket(`ws://${location.host}/ws`);

      ws.onopen = () => {
        statConn.textContent = 'connected';
        statConn.style.color = '#0fa';
        log('Connected to SIX telemetry', 'state');
      };

      ws.onclose = () => {
        statConn.textContent = 'offline';
        statConn.style.color = '#f44';
        log('Disconnected', 'state');
        setTimeout(connect, 2000);
      };

      ws.onmessage = (event) => {
        try { handleEvent(JSON.parse(event.data)); } catch (e) { console.error('Parse:', e); }
      };
    }

    function handleEvent(ev) {
      const d = ev.data || {};

      if (ev.component === 'Tokenizer' && ev.action === 'Chord') {
        // Update torus bits
        resetBits();
        const bits = d.activeBits || [];
        activateBits(bits, COLOR_ACTIVE);
        drawConnections(bits, COLOR_ACTIVE);

        statActive.textContent = `${bits.length} / 257`;
        updateDensity(d.density || 0);

        if (d.chunkText) chunkContent.textContent = d.chunkText;
        evalPanel.style.display = 'none';

        if (bits.length > 0) {
          const center = new THREE.Vector3();
          for (const b of bits) center.add(bitToPosition(b));
          center.divideScalar(bits.length);
          createPulse(center, COLOR_ACTIVE);
        }

        // Add chord node to group layer
        addChordNode(d.chordId || 0, d.bin || 0, d.state || 'stored', d.chunkText || '', bits, d.density || 0);
        statGroups.textContent = groups.size;

        log(`Chord [${bits.length}b] G${d.bin} "${(d.chunkText || '').trim().slice(0, 24)}"`, 'chord');
      }

      else if (ev.component === 'Cortex' && ev.action === 'Evaluate') {
        resetBits();
        const cancel = d.cancelBits || [];
        const prompt = d.activeBits || [];

        activateBits(prompt, COLOR_ACTIVE, 1.5);
        activateBits(cancel, COLOR_CANCEL, 3.5);
        drawConnections(cancel, COLOR_CANCEL);

        cancelCount.textContent = cancel.length;
        residueCount.textContent = d.residue || 0;
        evalPanel.style.display = 'block';
        updateDensity(d.density || 0);

        log(`XOR eval: ${cancel.length} cancelled, residue ${d.residue}`, 'evaluate');
      }

      else if (ev.component === 'Sequencer' && ev.action === 'Boundary') {
        statChunks.textContent = d.chunks || 0;
        log(`Boundary #${d.chunks} density=${((d.density || 0) * 100).toFixed(1)}%`, 'boundary');
      }

      else if (ev.component === 'LSM' && ev.action === 'Insert') {
        drawLSMEdge(d.left || 0, d.right || 0);
        document.querySelector('#stat-edges .val').textContent = d.edges || 0;
      }
    }

    // ── Animation loop ─────────────────────────────────────────────
    function animate() {
      requestAnimationFrame(animate);
      controls.update();

      // Pulse fade
      for (let i = pulses.length - 1; i >= 0; i--) {
        const p = pulses[i];
        p.scale.addScalar(0.08);
        p.material.opacity -= 0.015;
        if (p.material.opacity <= 0) { scene.remove(p); pulses.splice(i, 1); }
      }

      // Breathing on active bits
      const t = performance.now() * 0.003;
      for (let i = 0; i < BITS; i++) {
        const m = bitMeshes[i];
        if (m.material.opacity > 0.5) {
          const breathe = 1 + Math.sin(t + i * 0.1) * 0.15;
          m.scale.setScalar(m.scale.x * 0.95 + breathe * 2.5 * 0.05);
        }
      }

      // Gentle float on group markers
      for (const [bin, group] of groups) {
        group.marker.rotation.y += 0.01;
        group.marker.position.y = GROUP_Y + Math.sin(t + bin * 0.5) * 0.3;
      }

      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      labelRenderer.setSize(innerWidth, innerHeight);
    });

    animate();
    connect();
  </script>
</body>
</html>
