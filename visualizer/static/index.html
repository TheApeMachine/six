<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SIX — Chord Geometry Visualizer</title>
  <meta name="description" content="Real-time 3D visualization of the 257-bit chord space and geometric inference engine">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #030308;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      color: #aab;
    }
    canvas { display: block; }

    /* ── Glass Panel Base ─────────────────────────────────── */
    .glass {
      background: rgba(8, 8, 24, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(100, 120, 255, 0.12);
      border-radius: 10px;
    }

    /* ── HUD ──────────────────────────────────────────────── */
    #hud {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 100;
      pointer-events: none;
      padding: 16px 20px;
      min-width: 220px;
    }
    .hud-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 5px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #7df 0%, #c8f 50%, #ff4488 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 14px;
    }
    .hud-stat {
      font-size: 11px;
      margin-bottom: 5px;
      opacity: 0.65;
      display: flex;
      justify-content: space-between;
    }
    .hud-stat .val { color: #7df; font-weight: 600; }
    .hud-stat .warn { color: #fa4; }
    .hud-stat .hot { color: #f44; }
    .hud-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(100, 120, 255, 0.2), transparent);
      margin: 8px 0;
    }

    /* ── Pipeline Flow ────────────────────────────────────── */
    #pipeline {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 260px;
      z-index: 100;
      pointer-events: none;
      padding: 16px 18px;
    }
    .pipeline-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #668;
      margin-bottom: 12px;
    }
    .pipeline-stage {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      padding: 6px 0;
      opacity: 0.35;
      transition: all 0.3s ease;
    }
    .pipeline-stage.active {
      opacity: 1;
    }
    .pipeline-stage .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #334;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }
    .pipeline-stage.active .dot {
      background: #0fa;
      box-shadow: 0 0 12px rgba(0, 255, 170, 0.6);
      animation: pulse-dot 1s ease-in-out infinite;
    }
    .pipeline-stage.done .dot {
      background: #7df;
      box-shadow: 0 0 6px rgba(120, 220, 255, 0.3);
    }
    .pipeline-stage .stage-label { color: #889; }
    .pipeline-stage.active .stage-label { color: #ddf; }
    .pipeline-stage.done .stage-label { color: #8ab; }
    .pipeline-stage .stage-info {
      margin-left: auto;
      font-size: 10px;
      color: #556;
    }
    .pipeline-stage.active .stage-info { color: #0fa; }
    .pipeline-stage.done .stage-info { color: #7df; }
    .pipeline-connector {
      width: 1px;
      height: 10px;
      background: rgba(100, 120, 255, 0.1);
      margin-left: 3.5px;
    }
    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.4); }
    }

    /* ── Current Chunk ────────────────────────────────────── */
    #chunk-panel {
      position: absolute;
      bottom: 200px;
      right: 20px;
      width: 320px;
      z-index: 100;
      pointer-events: none;
      padding: 14px 16px;
    }
    .chunk-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #556;
      margin-bottom: 6px;
    }
    .chunk-text {
      font-size: 11px;
      color: #dde;
      line-height: 1.6;
      max-height: 80px;
      overflow: hidden;
      word-break: break-all;
    }
    .result-text {
      font-size: 11px;
      color: #0fa;
      line-height: 1.6;
      max-height: 80px;
      overflow: hidden;
      word-break: break-all;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(0, 255, 170, 0.15);
    }

    /* ── Log ──────────────────────────────────────────────── */
    #log-container {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 500px;
      max-height: 160px;
      overflow: hidden;
      display: flex;
      flex-direction: column-reverse;
      font-size: 10px;
      opacity: 0.55;
      pointer-events: none;
      z-index: 100;
    }
    .log-line {
      white-space: pre-wrap;
      margin-top: 2px;
      animation: slide-in 0.15s ease-out;
    }
    @keyframes slide-in {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .log-ingest    { color: #c8f; }
    .log-tokenize  { color: #7df; }
    .log-lookup    { color: #0fa; }
    .log-fold      { color: #f4f; }
    .log-result    { color: #0fa; }
    .log-pipeline  { color: #fa4; }
    .log-state     { color: #556; }

    /* ── Density Bar ──────────────────────────────────────── */
    #density-bar {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 10px;
      height: 160px;
      border-radius: 5px;
      overflow: hidden;
      z-index: 100;
    }
    #density-fill {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: linear-gradient(to top, #0af, #0fa);
      border-radius: 0 0 5px 5px;
      transition: height 0.3s ease, background 0.3s;
    }
    #density-label {
      position: absolute;
      bottom: 185px;
      right: 20px;
      font-size: 9px;
      color: #445;
      text-transform: uppercase;
      letter-spacing: 1px;
      z-index: 100;
    }

    /* ── Tooltip ──────────────────────────────────────────── */
    #tooltip {
      position: absolute;
      z-index: 200;
      pointer-events: none;
      display: none;
      padding: 10px 14px;
      font-size: 11px;
      line-height: 1.5;
      max-width: 300px;
      word-break: break-all;
    }
    #tooltip .tt-label { color: #556; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; }
    #tooltip .tt-text { color: #ddf; margin-top: 4px; }
    #tooltip .tt-state { color: #0fa; margin-top: 4px; font-weight: bold; }
    #tooltip .tt-bits { color: #7df; margin-top: 4px; font-size: 10px; }

    /* ── CSS2D Labels ─────────────────────────────────────── */
    .group-label {
      color: #c8f;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      text-shadow: 0 0 8px rgba(200, 128, 255, 0.5);
      pointer-events: none;
      white-space: nowrap;
      padding: 2px 6px;
      background: rgba(20, 10, 40, 0.5);
      border-radius: 4px;
      border: 1px solid rgba(200, 128, 255, 0.15);
    }
    .chord-label {
      color: #7df;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 600;
      opacity: 0.9;
      pointer-events: none;
      white-space: nowrap;
      text-shadow: 0 0 4px #000, 0 0 10px rgba(0, 170, 255, 0.6);
      padding: 2px 6px;
      background: rgba(10, 10, 20, 0.4);
      border-radius: 4px;
      border: 1px solid rgba(0, 170, 255, 0.12);
    }
    .chord-label.state-stored { color: #7df; }
    .chord-label.state-matched { color: #0fa; }
    .chord-label.state-active { color: #ff0; }
    .fold-label {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      pointer-events: none;
      white-space: nowrap;
      padding: 3px 8px;
      border-radius: 4px;
    }
    .fold-label.level-0 {
      font-size: 11px;
      color: #ff4488;
      text-shadow: 0 0 12px rgba(255, 68, 136, 0.6);
      background: rgba(60, 10, 25, 0.7);
      border: 1px solid rgba(255, 68, 136, 0.4);
    }
    .fold-label.level-1 {
      font-size: 10px;
      color: #44ff88;
      text-shadow: 0 0 10px rgba(68, 255, 136, 0.5);
      background: rgba(10, 40, 20, 0.6);
      border: 1px solid rgba(68, 255, 136, 0.3);
    }
    .fold-label.level-2 {
      font-size: 10px;
      color: #ffaa33;
      text-shadow: 0 0 8px rgba(255, 170, 51, 0.4);
      background: rgba(40, 25, 8, 0.6);
      border: 1px solid rgba(255, 170, 51, 0.3);
    }
    .fold-label.level-deep {
      font-size: 9px;
      color: #33ddff;
      text-shadow: 0 0 6px rgba(51, 221, 255, 0.4);
      background: rgba(8, 25, 40, 0.5);
      border: 1px solid rgba(51, 221, 255, 0.2);
    }
    .chord-node-label {
      color: #ddb766;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      opacity: 0.85;
      pointer-events: none;
      white-space: nowrap;
      text-shadow: 0 0 6px rgba(221, 183, 102, 0.3);
      padding: 1px 4px;
      background: rgba(30, 22, 8, 0.4);
      border-radius: 3px;
      border: 1px solid rgba(221, 183, 102, 0.12);
    }
  </style>
</head>
<body>

  <!-- HUD -->
  <div id="hud" class="glass">
    <div class="hud-title">SIX · Chord Space</div>
    <div class="hud-stat"><span>Ingested</span> <span class="val" id="stat-ingested">0</span></div>
    <div class="hud-stat"><span>Edges</span> <span class="val" id="stat-edges">0</span></div>
    <div class="hud-stat"><span>Groups</span> <span class="val" id="stat-groups">0</span></div>
    <div class="hud-divider"></div>
    <div class="hud-stat"><span>Queries</span> <span class="val" id="stat-queries">0</span></div>
    <div class="hud-stat"><span>Paths</span> <span class="val" id="stat-paths">0</span></div>
    <div class="hud-stat"><span>Folds</span> <span class="val" id="stat-folds">0</span></div>
    <div class="hud-divider"></div>
    <div class="hud-stat"><span>Status</span> <span class="val" id="stat-conn">offline</span></div>
  </div>

  <!-- Pipeline Flow -->
  <div id="pipeline" class="glass">
    <div class="pipeline-title">Pipeline</div>

    <div class="pipeline-stage" id="stage-tokenize">
      <div class="dot"></div>
      <span class="stage-label">Tokenizer</span>
      <span class="stage-info" id="stage-tokenize-info"></span>
    </div>
    <div class="pipeline-connector"></div>

    <div class="pipeline-stage" id="stage-insert">
      <div class="dot"></div>
      <span class="stage-label">LSM Insert</span>
      <span class="stage-info" id="stage-insert-info"></span>
    </div>
    <div class="pipeline-connector"></div>

    <div class="pipeline-stage" id="stage-lookup">
      <div class="dot"></div>
      <span class="stage-label">Wavefront Lookup</span>
      <span class="stage-info" id="stage-lookup-info"></span>
    </div>
    <div class="pipeline-connector"></div>

    <div class="pipeline-stage" id="stage-fold">
      <div class="dot"></div>
      <span class="stage-label">Recursive Fold</span>
      <span class="stage-info" id="stage-fold-info"></span>
    </div>
    <div class="pipeline-connector"></div>

    <div class="pipeline-stage" id="stage-decode">
      <div class="dot"></div>
      <span class="stage-label">Decode</span>
      <span class="stage-info" id="stage-decode-info"></span>
    </div>
  </div>

  <!-- Current Chunk -->
  <div id="chunk-panel" class="glass">
    <div class="chunk-label">Current Ingestion</div>
    <div class="chunk-text" id="chunk-text">—</div>
    <div class="result-text" id="result-text" style="display:none"></div>
  </div>

  <!-- Tooltip -->
  <div id="tooltip" class="glass">
    <div class="tt-label">Chord</div>
    <div class="tt-text" id="tt-text"></div>
    <div class="tt-state" id="tt-state"></div>
    <div class="tt-bits" id="tt-bits"></div>
  </div>

  <!-- Log -->
  <div id="log-container"></div>

  <!-- Density Bar -->
  <div id="density-label">Store</div>
  <div id="density-bar" class="glass"><div id="density-fill" style="height: 0%"></div></div>

  <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/" } }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ── Scene ──────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x030308, 0.005);

    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 500);
    camera.position.set(0, 22, 42);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    document.body.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(innerWidth, innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.3;

    // ── Constants ──────────────────────────────────────────────────
    const BITS = 257;
    const R_MAJOR = 14;
    const R_MINOR = 5;
    const GROUP_Y = 14;
    const GROUP_RADIUS = 12;
    const MAX_CHORD_NODES = 50;

    // ── 257-Bit Torus Layout ───────────────────────────────────────
    function bitToPosition(bitIdx) {
      const u = (bitIdx / BITS) * Math.PI * 2;
      const v = ((bitIdx * 7) % BITS) / BITS * Math.PI * 2;
      return new THREE.Vector3(
        (R_MAJOR + R_MINOR * Math.cos(v)) * Math.cos(u),
        R_MINOR * Math.sin(v),
        (R_MAJOR + R_MINOR * Math.cos(v)) * Math.sin(u)
      );
    }

    // ── Torus ──────────────────────────────────────────────────────
    const torusGeo = new THREE.TorusGeometry(R_MAJOR, R_MINOR, 48, 160);
    const torusSolidMat = new THREE.MeshPhongMaterial({
      color: 0x050515, specular: 0x222244, shininess: 60,
      transparent: false, opacity: 1.0
    });
    const torusWireMat = new THREE.MeshBasicMaterial({
      color: 0x151530, wireframe: true, transparent: true, opacity: 0.35,
      blending: THREE.AdditiveBlending
    });

    const torusSolid = new THREE.Mesh(torusGeo, torusSolidMat);
    torusSolid.rotation.x = -Math.PI / 2;
    scene.add(torusSolid);

    const torusWire = new THREE.Mesh(torusGeo, torusWireMat);
    torusWire.rotation.x = -Math.PI / 2;
    scene.add(torusWire);

    // ── LSM Ring (256 byte positions) ──────────────────────────────
    const LSM_RADIUS = 8;
    const LSM_Y = -8;
    const lsmGroup = new THREE.Group();
    scene.add(lsmGroup);

    const lsmByteMeshes = [];
    const lsmByteGeo = new THREE.SphereGeometry(0.07, 6, 6);
    const lsmByteMat = new THREE.MeshBasicMaterial({ color: 0x181030, transparent: true, opacity: 0.3 });

    for (let i = 0; i < 256; i++) {
      const angle = (i / 256) * Math.PI * 2;
      const mesh = new THREE.Mesh(lsmByteGeo, lsmByteMat.clone());
      mesh.position.set(LSM_RADIUS * Math.cos(angle), LSM_Y, LSM_RADIUS * Math.sin(angle));
      lsmGroup.add(mesh);
      lsmByteMeshes.push(mesh);
    }

    const lsmRingGeo = new THREE.RingGeometry(LSM_RADIUS - 0.04, LSM_RADIUS + 0.04, 128);
    const lsmRingMat = new THREE.MeshBasicMaterial({ color: 0x120826, side: THREE.DoubleSide, transparent: true, opacity: 0.12 });
    const lsmRingMesh = new THREE.Mesh(lsmRingGeo, lsmRingMat);
    lsmRingMesh.rotation.x = -Math.PI / 2;
    lsmRingMesh.position.y = LSM_Y;
    lsmGroup.add(lsmRingMesh);

    const lsmEdgeGroup = new THREE.Group();
    lsmGroup.add(lsmEdgeGroup);

    function lsmBytePosition(byteVal) {
      const angle = (byteVal / 256) * Math.PI * 2;
      return new THREE.Vector3(LSM_RADIUS * Math.cos(angle), LSM_Y, LSM_RADIUS * Math.sin(angle));
    }

    function drawLSMEdge(left, right) {
      const p1 = lsmBytePosition(left);
      const p2 = lsmBytePosition(right);
      const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
      mid.y = LSM_Y + 1.2;

      const curve = new THREE.QuadraticBezierCurve3(p1, mid, p2);
      const pts = curve.getPoints(16);
      const geo = new THREE.BufferGeometry().setFromPoints(pts);
      const mat = new THREE.LineBasicMaterial({ color: 0x6622aa, transparent: true, opacity: 0.12, blending: THREE.AdditiveBlending });
      lsmEdgeGroup.add(new THREE.Line(geo, mat));

      if (lsmEdgeGroup.children.length > 600) {
        const old = lsmEdgeGroup.children[0];
        lsmEdgeGroup.remove(old);
        old.geometry.dispose();
        old.material.dispose();
      }

      lsmByteMeshes[left % 256].material.color.setHex(0x8844ff);
      lsmByteMeshes[left % 256].material.opacity = 0.7;
      lsmByteMeshes[right % 256].material.color.setHex(0x8844ff);
      lsmByteMeshes[right % 256].material.opacity = 0.7;
    }

    // ── Group Labels ─────────────────────────────────────────────
    const groups = new Map();
    const groupLayer = new THREE.Group();
    scene.add(groupLayer);

    const groupRingGeo = new THREE.RingGeometry(GROUP_RADIUS - 0.03, GROUP_RADIUS + 0.03, 128);
    const groupRingMat = new THREE.MeshBasicMaterial({ color: 0x1a082e, side: THREE.DoubleSide, transparent: true, opacity: 0.08 });
    const groupRingMesh = new THREE.Mesh(groupRingGeo, groupRingMat);
    groupRingMesh.rotation.x = -Math.PI / 2;
    groupRingMesh.position.y = GROUP_Y;
    groupLayer.add(groupRingMesh);

    function groupPosition(bin) {
      const angle = (bin / 256) * Math.PI * 2;
      return new THREE.Vector3(GROUP_RADIUS * Math.cos(angle), GROUP_Y, GROUP_RADIUS * Math.sin(angle));
    }

    function getOrCreateGroup(bin) {
      if (groups.has(bin)) return groups.get(bin);

      const basePos = groupPosition(bin);
      const yOffset = ((bin * 37) % 7 - 3) * 0.5;
      const pos = new THREE.Vector3(basePos.x, basePos.y + yOffset, basePos.z);

      const labelDiv = document.createElement('div');
      labelDiv.className = 'group-label';
      labelDiv.textContent = '';
      const labelObj = new CSS2DObject(labelDiv);
      labelObj.position.copy(pos);
      groupLayer.add(labelObj);

      const group = { label: labelObj, labelDiv, chords: [], count: 0, pos, visibleCount: 0 };
      groups.set(bin, group);
      return group;
    }

    // ── Chord Nodes ──────────────────────────────────────────────
    const chordNodes = [];
    const chordNodeGroup = new THREE.Group();
    scene.add(chordNodeGroup);

    const chordLineMat = new THREE.LineBasicMaterial({ color: 0x997733, transparent: true, opacity: 0.25 });

    function addChordNode(chordId, bin, state, text) {
      const group = getOrCreateGroup(bin);
      group.count++;
      group.visibleCount++;
      group.chords.push({ id: chordId, text, state });

      group.labelDiv.textContent = group.chords[0].text.trim();

      const angle = (group.count * 2.399) % (Math.PI * 2);
      const r = Math.sqrt(Math.min(group.count, 12)) * 0.4;
      const nodePos = group.pos.clone().add(new THREE.Vector3(
        r * Math.cos(angle),
        -1.5 - Math.min(group.count, 8) * 0.15,
        r * Math.sin(angle)
      ));

      const div = document.createElement('div');
      div.className = 'chord-node-label';
      div.textContent = text.trim();
      const labelObj = new CSS2DObject(div);
      labelObj.position.copy(nodePos);
      chordNodeGroup.add(labelObj);

      const node = { labelObj, labelDiv: div, chordId, bin, state, text };
      chordNodes.push(node);

      const lineGeo = new THREE.BufferGeometry().setFromPoints([group.pos, nodePos]);
      const line = new THREE.Line(lineGeo, chordLineMat.clone());
      chordNodeGroup.add(line);
      node.line = line;

      if (chordNodes.length > MAX_CHORD_NODES) {
        const old = chordNodes.shift();
        chordNodeGroup.remove(old.labelObj);
        if (old.line) { chordNodeGroup.remove(old.line); old.line.geometry.dispose(); old.line.material.dispose(); }

        const oldGroup = groups.get(old.bin);
        if (oldGroup) {
          oldGroup.visibleCount--;
          if (oldGroup.visibleCount <= 0) {
            groupLayer.remove(oldGroup.label);
            groups.delete(old.bin);
          }
        }
      }
    }

    // ── Fold Tree ────────────────────────────────────────────────
    const foldNodes = new Map();
    const foldLayer = new THREE.Group();
    scene.add(foldLayer);
    const FOLD_BASE_Y = GROUP_Y + 3;
    const FOLD_LEVEL_STEP = 2.5;
    const foldChildCounts = new Map();

    function node_childIdx(parentKey) {
      const count = (foldChildCounts.get(parentKey) || 0);
      foldChildCounts.set(parentKey, count + 1);
      return count;
    }

    function addFoldNode(bin, level, theta, parentBin, _childCount, density, text) {
      const key = `${parentBin}-L${level}-${bin}`;
      if (foldNodes.has(key)) return;

      let parentKey = null;
      let parentPos = null;

      if (level > 0) {
        for (const [k, node] of foldNodes) {
          if (node.bin === parentBin && node.level === level - 1) {
            parentKey = k;
            parentPos = node.pos;
            break;
          }
        }
      }

      let pos;
      if (parentPos) {
        const spread = (node_childIdx(parentKey) * 2.0) - 1.0;
        pos = new THREE.Vector3(parentPos.x + spread, parentPos.y + FOLD_LEVEL_STEP, parentPos.z);
      } else {
        const radius = GROUP_RADIUS * 0.9;
        pos = new THREE.Vector3(radius * Math.cos(theta), FOLD_BASE_Y, radius * Math.sin(theta));
      }

      const levelClass = level === 0 ? 'level-0' : level === 1 ? 'level-1' : level === 2 ? 'level-2' : 'level-deep';
      const div = document.createElement('div');
      div.className = `fold-label ${levelClass}`;
      div.textContent = (text || '').trim() || `[${(density * 100).toFixed(0)}%]`;

      const labelObj = new CSS2DObject(div);
      labelObj.position.copy(pos);
      foldLayer.add(labelObj);

      foldNodes.set(key, { labelObj, pos, level, parentKey, bin, childIdx: 0 });

      if (parentKey && parentPos) {
        const lineColor = level === 1 ? 0x44ff88 : level === 2 ? 0xffaa33 : 0x33ddff;
        const lineGeo = new THREE.BufferGeometry().setFromPoints([parentPos, pos]);
        const lineMat = new THREE.LineBasicMaterial({ color: lineColor, transparent: true, opacity: 0.45 });
        foldLayer.add(new THREE.Line(lineGeo, lineMat));
      }
    }

    // ── Torus Surface Labels ─────────────────────────────────────
    const torusLabelsGroup = new THREE.Group();
    scene.add(torusLabelsGroup);
    const torusLabels = [];

    function addTorusLabel(text, centerPosition, state) {
      if (!text || text.trim() === '') return;

      const div = document.createElement('div');
      div.className = `chord-label state-${state || 'stored'}`;
      div.textContent = text.trim();

      const labelObj = new CSS2DObject(div);
      const p = centerPosition.clone();
      if (p.x === 0 && p.z === 0) p.x = 0.1;
      const theta = Math.atan2(p.z, p.x);
      const pMajor = new THREE.Vector3(R_MAJOR * Math.cos(theta), 0, R_MAJOR * Math.sin(theta));
      const yBias = Math.max(-1.0, Math.min(1.0, p.y / (R_MINOR * 0.35)));
      const phi = Math.asin(yBias);
      const dir = new THREE.Vector3(
        Math.cos(phi) * Math.cos(theta),
        Math.sin(phi),
        Math.cos(phi) * Math.sin(theta)
      ).normalize();

      labelObj.position.copy(pMajor).add(dir.multiplyScalar(R_MINOR + 1.2));
      torusLabelsGroup.add(labelObj);

      torusLabels.push({ obj: labelObj, div, createdAt: performance.now() });
      if (torusLabels.length > 50) {
        const old = torusLabels.shift();
        torusLabelsGroup.remove(old.obj);
      }
    }

    // ── Lighting ─────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0x334466, 0.4));

    const light1 = new THREE.PointLight(0x4488ff, 500, 100);
    light1.position.set(0, 30, 20);
    scene.add(light1);

    const light2 = new THREE.PointLight(0xff44aa, 350, 100);
    light2.position.set(0, -20, -20);
    scene.add(light2);

    const light3 = new THREE.PointLight(0x00ffaa, 200, 80);
    light3.position.set(20, 5, -10);
    scene.add(light3);

    // ── HUD References ───────────────────────────────────────────
    const logBox = document.getElementById('log-container');
    const statIngested = document.getElementById('stat-ingested');
    const statEdges = document.getElementById('stat-edges');
    const statGroups = document.getElementById('stat-groups');
    const statQueries = document.getElementById('stat-queries');
    const statPaths = document.getElementById('stat-paths');
    const statFolds = document.getElementById('stat-folds');
    const statConn = document.getElementById('stat-conn');
    const chunkText = document.getElementById('chunk-text');
    const resultText = document.getElementById('result-text');
    const densityFill = document.getElementById('density-fill');

    let totalIngested = 0;
    let totalEdges = 0;
    let totalQueries = 0;
    let totalPaths = 0;
    let totalFolds = 0;

    function log(text, type = 'state') {
      const div = document.createElement('div');
      div.className = `log-line log-${type}`;
      const t = new Date().toISOString().split('T')[1].slice(0, -1);
      div.textContent = `${t} ${text}`;
      logBox.insertBefore(div, logBox.firstChild);
      if (logBox.children.length > 40) logBox.removeChild(logBox.lastChild);
    }

    // ── Pipeline Stage Management ────────────────────────────────
    const stageElements = {
      'tokenize': document.getElementById('stage-tokenize'),
      'insert': document.getElementById('stage-insert'),
      'lookup': document.getElementById('stage-lookup'),
      'fold': document.getElementById('stage-fold'),
      'decode': document.getElementById('stage-decode'),
    };
    const stageInfoElements = {
      'tokenize': document.getElementById('stage-tokenize-info'),
      'insert': document.getElementById('stage-insert-info'),
      'lookup': document.getElementById('stage-lookup-info'),
      'fold': document.getElementById('stage-fold-info'),
      'decode': document.getElementById('stage-decode-info'),
    };

    let clearPipelineTimer = null;

    function activateStage(name, info) {
      Object.values(stageElements).forEach(el => {
        if (el.classList.contains('active')) {
          el.classList.remove('active');
          el.classList.add('done');
        }
      });

      const el = stageElements[name];
      if (el) {
        el.classList.remove('done');
        el.classList.add('active');
      }

      if (info && stageInfoElements[name]) {
        stageInfoElements[name].textContent = info;
      }

      if (clearPipelineTimer) clearTimeout(clearPipelineTimer);
      clearPipelineTimer = setTimeout(() => {
        Object.values(stageElements).forEach(el => {
          el.classList.remove('active', 'done');
        });
        Object.values(stageInfoElements).forEach(el => {
          el.textContent = '';
        });
      }, 3000);
    }

    function updateDensityBar(edgeCount) {
      const pct = Math.min((edgeCount / 5000) * 100, 100);
      densityFill.style.height = `${pct * 1.6}px`;

      if (pct > 60) {
        densityFill.style.background = 'linear-gradient(to top, #f44, #fa4)';
      } else if (pct > 30) {
        densityFill.style.background = 'linear-gradient(to top, #fa4, #ff0)';
      } else {
        densityFill.style.background = 'linear-gradient(to top, #0af, #0fa)';
      }
    }

    // ── WebSocket ────────────────────────────────────────────────
    function connect() {
      const ws = new WebSocket(`ws://${location.host}/ws`);

      ws.onopen = () => {
        statConn.textContent = 'connected';
        statConn.style.color = '#0fa';
        log('Connected to SIX telemetry', 'state');
      };

      ws.onclose = () => {
        statConn.textContent = 'offline';
        statConn.style.color = '#f44';
        log('Disconnected', 'state');
        setTimeout(connect, 2000);
      };

      ws.onmessage = (event) => {
        try { handleEvent(JSON.parse(event.data)); } catch (e) { console.error('Parse:', e); }
      };
    }

    function handleEvent(ev) {
      const d = ev.data || {};

      // ── Tokenizer.Chord ─────────────────────────────────
      if (ev.component === 'Tokenizer' && ev.action === 'Chord') {
        const stage = d.stage || '';
        const edgeCount = d.edgeCount || 0;
        const text = d.chunkText || '';

        if (stage === 'ingest-tokenize') {
          totalIngested++;
          statIngested.textContent = totalIngested;
          chunkText.textContent = text.slice(0, 120);
          activateStage('tokenize', `${edgeCount} edges`);
          log(`Ingest: "${text.slice(0, 50)}" → ${edgeCount} edges`, 'ingest');

          // Also visualize edges on the LSM ring
          if (text.length >= 2) {
            for (let i = 0; i < Math.min(text.length - 1, 10); i++) {
              drawLSMEdge(text.charCodeAt(i), text.charCodeAt(i + 1));
            }
          }
        }

        if (stage === 'tokenize') {
          totalQueries++;
          statQueries.textContent = totalQueries;
          activateStage('tokenize', `${edgeCount} edges`);
          log(`Query: "${text.slice(0, 50)}" → ${edgeCount} edges`, 'tokenize');
        }

        // Add chord node to the torus visualization
        const bits = d.activeBits || [];
        if (bits.length > 0) {
          const center = new THREE.Vector3();
          for (const b of bits) center.add(bitToPosition(b));
          center.divideScalar(bits.length);
          addTorusLabel(text, center, d.state);
        }

        if (d.bin !== undefined) {
          addChordNode(d.chordId || 0, d.bin || 0, d.state || 'stored', text);
          statGroups.textContent = groups.size;
        }
      }

      // ── LSM.Insert ──────────────────────────────────────
      else if (ev.component === 'LSM' && ev.action === 'Insert') {
        const edges = d.edges || d.edgeCount || 0;
        totalEdges += edges;
        statEdges.textContent = totalEdges;
        activateStage('insert', `${edges} stored`);
        updateDensityBar(totalEdges);

        if (d.left !== undefined && d.right !== undefined) {
          drawLSMEdge(d.left, d.right);
        }

        log(`LSM insert: ${edges} edges`, 'ingest');
      }

      // ── SpatialIndex.Lookup ─────────────────────────────
      else if (ev.component === 'SpatialIndex' && ev.action === 'Lookup') {
        const pathCount = d.pathCount || d.paths || 0;
        totalPaths += pathCount;
        statPaths.textContent = totalPaths;
        activateStage('lookup', `${pathCount} paths`);
        log(`Lookup: ${pathCount} paths for "${(d.msg || '').slice(0, 40)}"`, 'lookup');
      }

      // ── Cortex.Evaluate ─────────────────────────────────
      else if (ev.component === 'Cortex' && ev.action === 'Evaluate') {
        const pathCount = d.pathCount || 0;
        activateStage('fold', `${pathCount} results`);
        log(`Fold complete: ${pathCount} result paths`, 'fold');
      }

      // ── Cortex.Fold ─────────────────────────────────────
      else if (ev.component === 'Cortex' && ev.action === 'Fold') {
        totalFolds++;
        statFolds.textContent = totalFolds;
        addFoldNode(d.bin || 0, d.level || 0, d.theta || 0, d.parentBin ?? -1, d.childCount || 0, d.density || 0, d.chunkText || '');
        log(`Fold L${d.level} bin=${d.bin} children=${d.childCount}`, 'fold');
      }

      // ── Machine.Pipeline ────────────────────────────────
      else if (ev.component === 'Machine' && ev.action === 'Pipeline') {
        const stage = d.stage || '';

        if (stage === 'prompt-start') {
          chunkText.textContent = `Query: ${d.msg || ''}`;
          resultText.style.display = 'none';
          // Reset pipeline
          for (const el of Object.values(stageElements)) el.classList.remove('active', 'done');
          log(`Prompt: "${(d.msg || '').slice(0, 50)}"`, 'pipeline');
        }

        if (stage === 'prompt-complete') {
          activateStage('decode', '✓');
          resultText.textContent = `Result: ${(d.resultText || '').slice(0, 200)}`;
          resultText.style.display = 'block';
          log(`Result: "${(d.resultText || '').slice(0, 60)}"`, 'result');
        }

        if (stage === 'prompt-empty') {
          activateStage('decode', '∅');
          resultText.textContent = 'No result';
          resultText.style.display = 'block';
          log(`Empty result for "${(d.msg || '').slice(0, 40)}"`, 'state');
        }
      }

      // ── Sequencer.Boundary (legacy compatibility) ───────
      else if (ev.component === 'Sequencer' && ev.action === 'Boundary') {
        log(`Boundary #${d.chunks} density=${((d.density || 0) * 100).toFixed(1)}%`, 'tokenize');
      }
    }

    // ── Animation loop ─────────────────────────────────────────
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      labelRenderer.setSize(innerWidth, innerHeight);
    });

    animate();
    connect();
  </script>
</body>
</html>
